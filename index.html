<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VendBot 3000</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #f4f5f7;
  --surface:     #ffffff;
  --card:        #ffffff;
  --card-hi:     #f0f1ff;
  --border:      #e2e4ea;
  --text:        #1a1b2e;
  --muted:       #9395a8;
  --muted2:      #6b6d82;
  --accent:      #6366f1;
  --accent2:     #4f46e5;
  --accent-light:#eef0ff;
  --green:       #059669;
  --green-bg:    #ecfdf5;
  --red:         #e11d48;
  --red-bg:      #fff1f2;
  --amber:       #d97706;
  --amber-bg:    #fffbeb;
  --shadow:      0 1px 4px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.05);
  --shadow-hi:   0 2px 8px rgba(99,102,241,0.15), 0 8px 28px rgba(99,102,241,0.1);
  --radius:      14px;
  --radius-sm:   9px;
  --font-head:   'Outfit', sans-serif;
  --font-mono:   'JetBrains Mono', monospace;
}

html { font-size: 16px; }
body { background: var(--bg); color: var(--text); font-family: var(--font-head); min-height: 100vh; overflow-x: hidden; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #d1d3e0; border-radius: 4px; }

.header { display: flex; align-items: center; justify-content: space-between; padding: 0 40px; height: 66px; background: #fff; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
.logo-wrap { display: flex; align-items: center; gap: 12px; }
.logo-icon { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, #6366f1, #818cf8); display: flex; align-items: center; justify-content: center; font-size: 1rem; box-shadow: 0 4px 12px rgba(99,102,241,0.3); }
.logo { font-weight: 800; font-size: 1.05rem; letter-spacing: 2px; color: var(--text); }
.logo em { font-style: normal; color: var(--accent); }
.logo-sub { font-size: 0.5rem; font-family: var(--font-mono); color: var(--muted); letter-spacing: 3px; margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 16px; }
.conn-badge { display: flex; align-items: center; gap: 7px; font-size: 0.58rem; letter-spacing: 2px; color: var(--muted2); text-transform: uppercase; font-family: var(--font-mono); background: var(--bg); border: 1px solid var(--border); padding: 5px 12px; border-radius: 20px; }
.conn-dot { width: 7px; height: 7px; border-radius: 50%; background: #cbd5e1; flex-shrink: 0; transition: all 0.4s; }
.conn-dot.live { background: var(--green); box-shadow: 0 0 8px rgba(5,150,105,0.5); animation: pulse 2.4s ease-in-out infinite; }
.conn-dot.err  { background: var(--red); box-shadow: 0 0 8px rgba(225,29,72,0.4); }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
.clock { font-size: 0.65rem; color: var(--muted2); letter-spacing: 2px; font-family: var(--font-mono); padding: 5px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; }

.layout { display: grid; grid-template-columns: 1fr 360px; min-height: calc(100vh - 66px); }
.left  { padding: 32px 40px; }
.right { padding: 28px 24px; background: #f9fafb; border-left: 1px solid var(--border); display: flex; flex-direction: column; gap: 14px; }
.section-label { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.section-label-text { font-size: 0.58rem; font-weight: 700; font-family: var(--font-mono); letter-spacing: 3px; color: var(--muted); text-transform: uppercase; white-space: nowrap; }
.section-label-line { flex: 1; height: 1px; background: var(--border); }

.items-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 36px; }
.item-card { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); cursor: pointer; overflow: hidden; display: flex; flex-direction: row; align-items: stretch; min-height: 116px; transition: all 0.2s ease; user-select: none; box-shadow: var(--shadow); }
.item-card:hover { border-color: #a5b4fc; box-shadow: var(--shadow-hi); transform: translateY(-2px); }
.item-card.selected { border-color: var(--accent); background: var(--card-hi); box-shadow: 0 0 0 2px rgba(99,102,241,0.2), var(--shadow-hi); }
.item-img-wrap { width: 130px; flex-shrink: 0; overflow: hidden; background: #f3f4f8; border-right: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
.item-img-wrap img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; transition: transform 0.3s ease; }
.item-card:hover .item-img-wrap img { transform: scale(1.06); }
.item-content { flex: 1; padding: 16px 18px; display: flex; flex-direction: column; justify-content: space-between; min-width: 0; }
.item-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 6px; }
.item-slot-badge { font-size: 0.52rem; font-family: var(--font-mono); font-weight: 500; letter-spacing: 2px; color: var(--accent); background: var(--accent-light); padding: 3px 9px; border-radius: 20px; }
.item-check { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: #fff; font-weight: bold; opacity: 0; transform: scale(0.3); transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1); flex-shrink: 0; }
.item-card.selected .item-check { opacity: 1; transform: scale(1); }
.item-name { font-size: 1rem; font-weight: 800; color: var(--text); line-height: 1.2; margin-bottom: 3px; }
.item-tag  { font-size: 0.62rem; color: var(--muted); font-family: var(--font-mono); margin-bottom: 10px; }
.item-bottom { display: flex; align-items: center; justify-content: space-between; }
.item-price-wrap { display: flex; align-items: baseline; gap: 1px; }
.item-price-sym { font-size: 0.8rem; color: var(--accent2); font-weight: 700; }
.item-price-val { font-size: 1.55rem; font-weight: 900; color: var(--accent2); line-height: 1; }
.item-stock { font-size: 0.56rem; font-family: var(--font-mono); color: var(--green); background: var(--green-bg); border: 1px solid #a7f3d0; padding: 3px 8px; border-radius: 6px; text-transform: uppercase; letter-spacing: 1px; }
.item-stock.low { color: var(--amber); background: var(--amber-bg); border-color: #fde68a; }
.item-stock.out { color: var(--red); background: var(--red-bg); border-color: #fecdd3; }
.qty-row { display: none; align-items: center; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.item-card.selected .qty-row { display: flex; }
.qty-label { font-size: 0.55rem; color: var(--muted); font-family: var(--font-mono); letter-spacing: 1px; margin-right: 2px; }
.qty-btn { width: 28px; height: 28px; border-radius: 8px; background: var(--accent-light); border: 1px solid #c7d2fe; color: var(--accent2); font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; font-family: var(--font-mono); font-weight: 600; }
.qty-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.qty-val { font-size: 0.88rem; font-weight: 800; color: var(--accent); min-width: 24px; text-align: center; }

.pay-block { margin-top: 4px; }
.btn-pay { width: 100%; padding: 17px 24px; border: none; border-radius: var(--radius); background: linear-gradient(135deg, #4f46e5 0%, #6366f1 60%, #818cf8 100%); color: #fff; font-family: var(--font-head); font-size: 0.88rem; font-weight: 800; letter-spacing: 1.5px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; box-shadow: 0 4px 20px rgba(99,102,241,0.35); display: flex; align-items: center; justify-content: center; gap: 10px; }
.btn-pay:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(99,102,241,0.45); }
.btn-pay:active:not(:disabled) { transform: translateY(0); }
.btn-pay:disabled { background: #e2e4ea; color: var(--muted); box-shadow: none; cursor: not-allowed; }
.btn-pay.processing { background: linear-gradient(135deg, #374151 0%, #4b5563 100%); cursor: not-allowed; pointer-events: none; }
.pay-spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }
.pay-meta { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }
.pay-meta-item { font-size: 0.55rem; color: var(--muted); font-family: var(--font-mono); }
.pay-meta-dot  { width: 3px; height: 3px; border-radius: 50%; background: var(--border); }
.pay-status { text-align: center; font-size: 0.6rem; font-family: var(--font-mono); margin-top: 6px; height: 14px; }
.pay-status.ready   { color: var(--green); }
.pay-status.fetching{ color: var(--amber); }

.panel-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); }
.order-empty { font-size: 0.68rem; font-family: var(--font-mono); color: var(--muted); text-align: center; padding: 20px 0; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.order-empty-icon { font-size: 2rem; }
.order-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 8px; }
.order-row:last-of-type { border-bottom: none; }
.order-row-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.order-thumb { width: 38px; height: 38px; border-radius: 9px; object-fit: cover; flex-shrink: 0; background: var(--bg); border: 1px solid var(--border); }
.order-info { min-width: 0; }
.order-name { font-size: 0.72rem; color: var(--text); font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
.order-slot { font-size: 0.52rem; color: var(--muted); font-family: var(--font-mono); letter-spacing: 2px; }
.order-row-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.oqty { display: flex; align-items: center; gap: 3px; background: var(--accent-light); border: 1px solid #c7d2fe; border-radius: 8px; padding: 3px 5px; }
.oqty-btn { width: 20px; height: 20px; border-radius: 5px; background: none; border: none; color: var(--accent); font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; font-family: var(--font-mono); font-weight: 600; }
.oqty-btn:hover { color: var(--accent2); }
.oqty-val { font-size: 0.7rem; font-weight: 700; color: var(--accent); min-width: 16px; text-align: center; }
.order-price { font-size: 0.78rem; font-weight: 800; color: var(--text); white-space: nowrap; }
.row-remove { background: none; border: none; color: var(--muted); font-size: 0.65rem; cursor: pointer; padding: 3px 5px; transition: all 0.15s; border-radius: 5px; }
.row-remove:hover { color: var(--red); background: var(--red-bg); }
.total-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; padding-top: 12px; border-top: 2px solid var(--border); }
.total-label { font-size: 0.6rem; font-family: var(--font-mono); letter-spacing: 3px; color: var(--muted); text-transform: uppercase; }
.total-amount { font-size: 1.7rem; font-weight: 900; color: var(--accent2); line-height: 1; }
.log-feed { max-height: 140px; overflow-y: auto; display: flex; flex-direction: column; gap: 1px; }
.log-line { font-size: 0.56rem; line-height: 1.8; display: flex; gap: 8px; font-family: var(--font-mono); }
.log-ts  { color: var(--muted); flex-shrink: 0; }
.log-ok  { color: var(--green); }
.log-info{ color: var(--muted2); }
.log-err { color: var(--red); }
.btn-cancel { width: 100%; padding: 11px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--muted2); font-family: var(--font-mono); font-size: 0.62rem; cursor: pointer; transition: all 0.15s; letter-spacing: 1px; box-shadow: var(--shadow); }
.btn-cancel:hover { border-color: var(--red); color: var(--red); background: var(--red-bg); }
.dummy-badge { font-size: 0.48rem; font-family: var(--font-mono); letter-spacing: 2px; color: var(--amber); background: var(--amber-bg); border: 1px solid #fde68a; padding: 2px 8px; border-radius: 20px; margin-left: 6px; }

.overlay { position: fixed; inset: 0; z-index: 8000; background: rgba(30,30,60,0.45); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.overlay.show { opacity: 1; pointer-events: all; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 44px 38px; max-width: 380px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.18); transform: translateY(20px) scale(0.96); transition: transform 0.32s cubic-bezier(0.34,1.56,0.64,1); }
.overlay.show .modal { transform: translateY(0) scale(1); }
.modal-icon  { font-size: 3rem; display: block; margin-bottom: 12px; }
.modal-title { font-size: 0.85rem; font-weight: 900; letter-spacing: 4px; color: var(--accent2); margin-bottom: 12px; }
.modal-body  { font-size: 0.7rem; line-height: 2; color: var(--muted2); margin-bottom: 16px; white-space: pre-line; font-family: var(--font-mono); }
.modal-txn   { font-size: 0.55rem; color: var(--muted); margin-bottom: 24px; letter-spacing: 1.5px; padding: 6px 12px; background: var(--bg); border-radius: 6px; border: 1px solid var(--border); display: inline-block; font-family: var(--font-mono); }
.modal-close { background: linear-gradient(135deg,#4f46e5,#818cf8); color: #fff; border: none; padding: 13px 36px; border-radius: 10px; font-family: var(--font-head); font-size: 0.72rem; font-weight: 800; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 16px rgba(99,102,241,0.3); }
.modal-close:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,0.4); }

@media (max-width: 860px) {
  .layout { grid-template-columns: 1fr; }
  .left  { padding: 24px 20px; }
  .right { border-left: none; border-top: 1px solid var(--border); padding: 20px; }
  .header{ padding: 0 20px; }
  .item-img-wrap { width: 100px; }
}
@media (max-width: 480px) {
  .item-img-wrap { width: 88px; }
  .item-price-val { font-size: 1.3rem; }
  .item-name { font-size: 0.9rem; }
}
</style>
</head>
<body>

<header class="header">
  <div class="logo-wrap">
    <div class="logo-icon">🤖</div>
    <div>
      <div class="logo">VEND<em>BOT</em> <span style="opacity:0.35;font-weight:400;font-size:0.8rem">3000</span></div>
      <div class="logo-sub">SMART VENDING SYSTEM</div>
    </div>
  </div>
  <div class="header-right">
    <div class="conn-badge">
      <div class="conn-dot" id="connDot"></div>
      <span id="connLabel">CONNECTING</span>
    </div>
    <div class="clock" id="clock"></div>
  </div>
</header>

<div class="layout">
  <div class="left">
    <div class="section-label">
      <span class="section-label-text">Select Items</span>
      <div class="section-label-line"></div>
    </div>
    <div class="items-list" id="itemsGrid"></div>
    <div class="pay-block">
      <div class="section-label">
        <span class="section-label-text">Checkout</span>
        <div class="section-label-line"></div>
      </div>
      <button class="btn-pay" id="btnPay" onclick="handlePay()" disabled>
        <span id="payIconWrap">💳</span>
        <span id="payLabel">Pay with Razorpay</span>
        <span class="dummy-badge">DEMO</span>
      </button>
      <div class="pay-meta">
        <span class="pay-meta-item">🔒 Secured by Razorpay</span>
        <div class="pay-meta-dot"></div>
        <span class="pay-meta-item">UPI · Cards · NetBanking</span>
        <div class="pay-meta-dot"></div>
        <span class="pay-meta-item" style="color:var(--amber)">DEMO MODE</span>
      </div>
      <div class="pay-status" id="payStatus"></div>
    </div>
  </div>

  <div class="right">
    <div class="panel-box">
      <div class="section-label" style="margin-bottom:12px">
        <span class="section-label-text">Your Order</span>
        <div class="section-label-line"></div>
      </div>
      <div id="orderList">
        <div class="order-empty"><span class="order-empty-icon">🛒</span>No items selected</div>
      </div>
      <div class="total-bar" id="totalBar" style="display:none">
        <span class="total-label">Total</span>
        <span class="total-amount" id="totalAmt">₹0</span>
      </div>
    </div>
    <button class="btn-cancel" onclick="cancelAll()">✕ &nbsp;Clear Cart</button>
    <div class="panel-box" style="flex:1">
      <div class="section-label" style="margin-bottom:10px">
        <span class="section-label-text">Activity Log</span>
        <div class="section-label-line"></div>
      </div>
      <div class="log-feed" id="logFeed"></div>
    </div>
  </div>
</div>

<!-- Result Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <span class="modal-icon" id="modalIcon">✅</span>
    <div class="modal-title" id="modalTitle">ORDER CONFIRMED</div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-txn" id="modalTxn"></div>
    <button class="modal-close" onclick="closeModal()">DONE</button>
  </div>
</div>

<script>
const MQTT_BROKER   = 'wss://366c887e88bf40c496821b5e646d3a12.s1.eu.hivemq.cloud:8884/mqtt';
const MQTT_USERNAME = 'hivemq.webclient.1773649961783';
const MQTT_PASSWORD = 'FklRd4q@2&7DUc,.AZx6';
const TOPICS        = { order:'vendbot/order', payment:'vendbot/payment' };
const API_BASE      = 'https://tmkc-sarvadnya.onrender.com';

const PRODUCTS = [
  { id:'A1', name:'Khatta Meetha', img:'Khatta Mitha Mix.png', fallbackImg:'https://images.jdmagicbox.com/quickquotes/images_main/balaji-khatta-meetha-namkeen-2216297604-h3y2l.jpg', price:1, stock:0, tag:'Tangy & Sweet' },
  { id:'A2', name:'Tikha Meetha',  img:'Tikha Mitha Mix.png',  fallbackImg:'https://images.jdmagicbox.com/quickquotes/images_main/balaji-tikha-meetha-namkeen-2216297604-h3y2l.jpg', price:1, stock:0, tag:'Spicy & Sweet' },
  { id:'B1', name:'Farali Chiwda', img:'Farali Chevda.png',    fallbackImg:'https://5.imimg.com/data5/SELLER/Default/2021/8/WF/KT/WS/135395934/balaji-farali-chevdo.jpg',           price:1, stock:0, tag:'Light & Crispy' },
  { id:'B2', name:'Chataka Pataka',img:'Chataka Pataka.png',   fallbackImg:'https://5.imimg.com/data5/SELLER/Default/2021/8/LB/BI/RQ/135395934/balaji-chataka-pataka.jpg',          price:1, stock:0, tag:'Masala Masti' },
];

let cart = {}, client = null, isProcessing = false;

function genDummyPayId()   { return 'pay_DEMO'   + Date.now().toString(36).toUpperCase() + Math.random().toString(36).slice(2,6).toUpperCase(); }
function genDummyOrderId() { return 'order_DEMO' + Date.now().toString(36).toUpperCase(); }

async function syncStock() {
  try {
    const r = await fetch(API_BASE + '/api/stock', { signal: AbortSignal.timeout(8000) });
    if (!r.ok) throw new Error('stock ' + r.status);
    const data = await r.json();
    (data.stock || []).forEach(s => { const p = PRODUCTS.find(x => x.id === s.slot); if (p) p.stock = s.stock; });
    log('Stock synced from server', 'ok');
  } catch (e) { log('Stock sync failed: ' + e.message, 'err'); }
}

function warmBackend() {
  fetch(API_BASE + '/api/create-order', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({amount:1}), signal:AbortSignal.timeout(8000) })
    .then(r=>r.json()).then(()=>log('Backend warm','ok'))
    .catch(()=>log('Warm-up skipped (offline?)','info'));
}

function mqttConnect(){
  log('Connecting to broker...','info');
  client=mqtt.connect(MQTT_BROKER,{clientId:'vb_'+Math.random().toString(36).slice(2,8),clean:true,reconnectPeriod:4000,username:MQTT_USERNAME,password:MQTT_PASSWORD});
  client.on('connect',()=>{setConn('live','LIVE');log('Connected ✓','ok');});
  client.on('error',e=>{setConn('err','ERROR');log('MQTT: '+e.message,'err');});
  client.on('offline',()=>{setConn('','OFFLINE');log('Offline — retrying...','err');});
}
function mqttPublish(topic,payload){
  return new Promise((resolve,reject)=>{
    const pub=()=>client.publish(topic,JSON.stringify(payload),{qos:1},err=>{if(err){log('Publish failed: '+err.message,'err');reject(err);}else{log('Published → '+topic,'ok');resolve();}});
    if(client&&client.connected)pub();
    else setTimeout(()=>{if(client&&client.connected)pub();else{log('Still not connected','err');reject(new Error('Not connected'));}},2000);
  });
}

function renderProducts(){
  document.getElementById('itemsGrid').innerHTML=PRODUCTS.map(p=>{
    const qty=cart[p.id]||0,sel=qty>0,noSt=p.stock===0,lowSt=p.stock<=2&&!noSt;
    const stockLabel=noSt?'OUT OF STOCK':(lowSt?p.stock+' LEFT':p.stock+' IN STOCK');
    const stockClass=noSt?'out':(lowSt?'low':'');
    return `<div class="item-card ${sel?'selected':''}" id="card_${p.id}" onclick="${noSt?'':` toggleItem('${p.id}')`}" style="${noSt?'opacity:.4;cursor:not-allowed;pointer-events:none':''}">
      <div class="item-img-wrap"><img src="${p.img}" alt="${p.name}" onerror="this.onerror=null;this.src='${p.fallbackImg}'"></div>
      <div class="item-content">
        <div>
          <div class="item-top"><span class="item-slot-badge">SLOT ${p.id}</span><div class="item-check">✓</div></div>
          <div class="item-name">${p.name}</div>
          <div class="item-tag">${p.tag}</div>
        </div>
        <div>
          <div class="item-bottom">
            <div class="item-price-wrap"><span class="item-price-sym">₹</span><span class="item-price-val">${p.price}</span></div>
            <div class="item-stock ${stockClass}">${stockLabel}</div>
          </div>
          <div class="qty-row">
            <span class="qty-label">QTY</span>
            <button class="qty-btn" onclick="event.stopPropagation();changeQty('${p.id}',-1)">−</button>
            <span class="qty-val">${qty}</span>
            <button class="qty-btn" onclick="event.stopPropagation();changeQty('${p.id}',+1)">+</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderOrder(){
  const listEl=document.getElementById('orderList'),totalBar=document.getElementById('totalBar'),totalAmt=document.getElementById('totalAmt'),btnPay=document.getElementById('btnPay'),payLabel=document.getElementById('payLabel');
  const entries=PRODUCTS.filter(p=>(cart[p.id]||0)>0);
  if(!entries.length){
    listEl.innerHTML='<div class="order-empty"><span class="order-empty-icon">🛒</span>No items selected</div>';
    totalBar.style.display='none';
    if(!isProcessing){btnPay.disabled=true;payLabel.textContent='Pay with Razorpay';setPayStatus('','');}
  } else {
    listEl.innerHTML=entries.map(p=>`
      <div class="order-row">
        <div class="order-row-left">
          <img class="order-thumb" src="${p.img}" alt="${p.name}" onerror="this.onerror=null;this.src='${p.fallbackImg}'">
          <div class="order-info"><span class="order-name">${p.name}</span><span class="order-slot">SLOT ${p.id}</span></div>
        </div>
        <div class="order-row-right">
          <div class="oqty">
            <button class="oqty-btn" onclick="changeQty('${p.id}',-1)">−</button>
            <span class="oqty-val">${cart[p.id]}</span>
            <button class="oqty-btn" onclick="changeQty('${p.id}',+1)">+</button>
          </div>
          <span class="order-price">₹${p.price*cart[p.id]}</span>
          <button class="row-remove" onclick="removeItem('${p.id}')">✕</button>
        </div>
      </div>`).join('');
    totalBar.style.display='flex';
    const t=total();totalAmt.textContent='₹'+t;
    if(!isProcessing){btnPay.disabled=false;payLabel.textContent=`Pay ₹${t}`;}
  }
}

function total(){return PRODUCTS.reduce((s,p)=>s+p.price*(cart[p.id]||0),0);}
function buildItems(){return PRODUCTS.filter(p=>(cart[p.id]||0)>0).map(p=>({slot:p.id,name:p.name,qty:cart[p.id],price:p.price,subtotal:p.price*cart[p.id]}));}

function toggleItem(id){const p=PRODUCTS.find(x=>x.id===id);if(!p||p.stock===0)return;if((cart[id]||0)>0)delete cart[id];else cart[id]=1;renderProducts();renderOrder();}
function changeQty(id,delta){const p=PRODUCTS.find(x=>x.id===id),nxt=(cart[id]||0)+delta;if(nxt<=0)delete cart[id];else if(nxt>p.stock){log('Max stock reached for '+p.name,'err');return;}else cart[id]=nxt;renderProducts();renderOrder();}
function removeItem(id){delete cart[id];renderProducts();renderOrder();log('Item removed','info');}
function cancelAll(){if(isProcessing)return;cart={};renderProducts();renderOrder();setPayStatus('','');log('Cart cleared','info');}

// ── INSTANT PAY — no popup, no method selection ──
function handlePay(){
  if(isProcessing) return;
  const t=total(); if(!t) return;

  isProcessing=true;
  const btn=document.getElementById('btnPay');
  const payLabel=document.getElementById('payLabel');
  const iconWrap=document.getElementById('payIconWrap');

  btn.classList.add('processing');
  btn.disabled=true;
  iconWrap.innerHTML='<div class="pay-spinner"></div>';
  payLabel.textContent='PROCESSING...';
  log('Processing payment...','info');

  const steps=['Connecting...','Verifying...','Authorising...','Success ✓'];
  let i=0;
  setPayStatus('fetching', steps[0]);

  const tick=setInterval(()=>{
    i++;
    if(i<steps.length){
      setPayStatus('fetching', steps[i]);
      payLabel.textContent=steps[i].toUpperCase();
    } else {
      clearInterval(tick);
      onPaymentSuccess({
        razorpay_payment_id: genDummyPayId(),
        razorpay_order_id:   genDummyOrderId(),
        razorpay_signature:  'DEMO_SIG_'+Math.random().toString(36).slice(2,12).toUpperCase(),
        method:'ONLINE'
      }, buildItems(), t);
    }
  }, 200);
}

async function onPaymentSuccess(response, items, t){
  const ts=new Date().toISOString();
  mqttPublish(TOPICS.order,{transactionId:response.razorpay_payment_id,razorpayOrderId:response.razorpay_order_id,timestamp:ts,paymentMethod:response.method||'ONLINE',items,totalAmount:t});
  mqttPublish(TOPICS.payment,{transactionId:response.razorpay_payment_id,razorpayOrderId:response.razorpay_order_id,razorpaySignature:response.razorpay_signature,timestamp:ts,paymentMethod:response.method||'ONLINE',amountPaid:t,currency:'INR',changeDue:0,status:'SUCCESS',items});

  const summary=items.map(i=>`${i.name} ×${i.qty}  ₹${i.subtotal}`).join('\n');
  showModal('✅','PAYMENT SUCCESS',`${summary}\n\nTotal Paid: ₹${t}`,response.razorpay_payment_id);
  sendBackendVerification(response,items,t);

  cart={}; isProcessing=false;
  const btn=document.getElementById('btnPay');
  btn.classList.remove('processing');
  document.getElementById('payIconWrap').innerHTML='💳';

  await syncStock();
  renderProducts(); renderOrder(); setPayStatus('','');
}

async function sendBackendVerification(response, items, totalAmount){
  try{
    const res=await fetch(API_BASE+'/api/verify-payment',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({razorpay_order_id:response.razorpay_order_id,razorpay_payment_id:response.razorpay_payment_id,razorpay_signature:response.razorpay_signature,items,totalAmount})});
    const data=await res.json();
    if(data.success)log('Backend verified ✓','ok');
    else log('Backend verification skipped (DEMO)','info');
  }catch(err){log('Backend verify skipped: '+err.message,'info');}
}

function showModal(icon,title,body,txn){
  document.getElementById('modalIcon').textContent=icon;
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').textContent=body;
  document.getElementById('modalTxn').textContent=txn?'TXN: '+txn+' [DEMO]':'';
  document.getElementById('overlay').classList.add('show');
}
function closeModal(){document.getElementById('overlay').classList.remove('show');}
function setConn(state,label){document.getElementById('connDot').className='conn-dot '+state;document.getElementById('connLabel').textContent=label;}
function setPayStatus(cls,msg){const el=document.getElementById('payStatus');el.className='pay-status'+(cls?' '+cls:'');el.textContent=msg;}
function log(msg,type='info'){const feed=document.getElementById('logFeed'),ts=new Date().toLocaleTimeString('en-GB',{hour12:false}),el=document.createElement('div');el.className='log-line';el.innerHTML=`<span class="log-ts">[${ts}]</span><span class="log-${type}">${msg}</span>`;feed.prepend(el);while(feed.children.length>40)feed.removeChild(feed.lastChild);}
function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-GB',{hour12:false});}

(async function init(){
  renderProducts(); renderOrder();
  await syncStock(); renderProducts();
  mqttConnect(); warmBackend();
})();
updateClock(); setInterval(updateClock,1000);
</script>
</body>
</html>
